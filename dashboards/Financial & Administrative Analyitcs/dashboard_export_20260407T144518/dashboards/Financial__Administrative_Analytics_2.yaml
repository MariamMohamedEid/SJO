  \ 8px;\n    box-shadow: 0 2px 8px rgba(0,0,0,0.08);\n    background: #FFFFFF;\n\
  }\n\n.dragdroppable-column {\n    background: transparent;\n}\n\n/* Big number chart\
  \ color */\n.chart-header {\n    color: #007A7A;\n    font-weight: 600;\n}\n\n/*\
  \ Make chart titles teal */\n.slice_description {\n    color: #007A7A;\n}\n/* Force\
  \ teal as primary chart color */\n.rv-xy-plot__series--line path {\n    stroke:\
  \ #007A7A;\n}\n\n.recharts-bar-rectangle path {\n    fill: #007A7A;\n}\n\n/* Big\
  \ number KPI color */\n.superset-legacy-chart-big-number .header-line {\n    color:\
  \ #007A7A !important;\n}"
