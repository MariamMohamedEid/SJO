table_name: cases_main
main_dttm_col: filing_date
description: null
default_endpoint: null
offset: 0
cache_timeout: null
schema: null
sql: "SELECT\n    f.case_key,\n    f.case_number,\n    f.case_year,\n    f.case_category,\n\
  \    f.court_level,\n    f.status_category,\n    f.case_duration_days,\n    f.days_to_first_hearing,\n\
  \    f.is_sla_breached,\n    f.sla_target_days,\n    f.judicial_fees_amount,\n \
  \   f.execution_revenue,\n    f.claim_amount,\n    -- Filing date attributes\n \
  \   d.full_date         AS filing_date,\n    d.year              AS filing_year,\n\
  \    d.month             AS filing_month,\n    d.month_name        AS filing_month_name,\n\
  \    d.quarter           AS filing_quarter,\n    -- Court attributes\n    co.court_name_en,\n\
  \    co.governorate_name_en,\n    co.governorate_code,\n    co.wilayat_name_en,\n\
  \    -- Circuit attributes\n    ci.circuit_name_en,\n    ci.panel_type_en,\n   \
  \ -- Judge attributes\n    j.judge_name_en,\n    j.rank_en           AS judge_rank,\n\
  \    j.court_level       AS judge_court_level,\n    -- Status attributes\n    s.status_name_en,\n\
  \    s.status_code,\n    s.is_terminal\nFROM iceberg.marts.fact_cases          \
  \    f\nJOIN iceberg.marts.dim_date                d   ON f.filing_date_key  = d.date_key\n\
  JOIN iceberg.marts.dim_court               co  ON f.court_key        = co.court_key\n\
  JOIN iceberg.marts.dim_circuit             ci  ON f.circuit_key      = ci.circuit_key\n\
  LEFT JOIN iceberg.marts.dim_judge          j   ON f.judge_key        = j.judge_key\n\
  JOIN iceberg.marts.dim_case_status         s   ON f.status_key       = s.status_key"
