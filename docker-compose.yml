services:
  # --------------------------
  # Source Postgres
  # --------------------------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: judicial_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net
  # --------------------------
  # NiFi
  # --------------------------
  nifi:
    image: apache/nifi:2.8.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: admin123
    volumes:
      - ./nifi_data:/opt/nifi/nifi-current/data
      - ./nifi_lib/postgresql.jar:/opt/nifi/nifi-current/lib/postgresql.jar
      - ./nifi_lib/nifi-hadoop-libraries.nar:/opt/nifi/nifi-current/lib/nifi-hadoop-libraries.nar
      - ./nifi_lib/nifi-parquet.nar:/opt/nifi/nifi-current/lib/nifi-parquet.nar
    depends_on:
      - postgres
      - minio
    networks:
      - lakehouse_net
  # --------------------------
  # MinIO (S3 Storage)
  # --------------------------
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_net
  # --------------------------
  # PostgreSQL for Hive Metastore
  # --------------------------
  metastore_db:
    image: postgres:15
    container_name: metastore_db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    command: >
      postgres -c password_encryption=md5
    volumes:
      - metastore_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      retries: 5
      start_period: 20s
  # --------------------------
  # Hive Metastore
  # --------------------------
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    platform: linux/amd64
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore_db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./hive/hadoop-aws-2.10.2.jar:/opt/hive/lib/hadoop-aws-2.10.2.jar
      - ./hive/aws-java-sdk-bundle-1.11.1026.jar:/opt/hive/lib/aws-java-sdk-bundle-1.11.1026.jar
      - ./hive/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    depends_on:
      metastore_db:
        condition: service_healthy
    ports:
      - "9083:9083"
    networks:
      - lakehouse_net
  # --------------------------
  # Trino
  # --------------------------
  trino:
    image: trinodb/trino:435
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      - hive-metastore
      - minio
    networks:
      - lakehouse_net
  # --------------------------
  # DBT
  # --------------------------
  dbt:
      image: python:3.11-slim
      container_name: dbt
      ports:
        - "8081:8081"
      volumes:
        - ./dbt:/usr/app/dbt
      working_dir: /usr/app/dbt
      environment:
        DBT_PROFILES_DIR: /usr/app/dbt
      command: >
        bash -c "apt-get update -qq && apt-get install -y git --quiet &&
                pip install dbt-trino==1.8.3 --quiet &&
                tail -f /dev/null"
      depends_on:
        - trino
      networks:
        - lakehouse_net
# --------------------------
  # Superset DB
  # --------------------------
  superset_db:
    image: postgres:15
    container_name: superset_db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net
  # --------------------------
  # Redis (Superset cache)
  # --------------------------
  redis:
    image: redis:7
    container_name: redis
    networks:
      - lakehouse_net
  # --------------------------
  # Superset
  # --------------------------
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    environment:
      SUPERSET_SECRET_KEY: "a_very_secret_key_change_in_prod"
      DATABASE_URL: postgresql+psycopg2://superset:superset@superset_db:5432/superset
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8088:8088"
    depends_on:
      - superset_db
      - redis
      - trino
    networks:
      - lakehouse_net
    command: >
      bash -c "
        pip install trino sqlalchemy-trino psycopg2-binary --quiet &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
volumes:
  postgres_data:
  minio_data:
  metastore_db_data:
  superset_db_data: 

networks:
  lakehouse_net: